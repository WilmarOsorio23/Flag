<div class="message-container" id="message-container">
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show floating-alert" role="alert">
    {{ errorMessage }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
</div>

<div class="main">
  <div class="container b-container" id="b-container">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <img src="/static/resource/logo.webp" alt="Flag Soluciones Logo" style="width: 150px;" />
        <h2 class="form_title title">Iniciar Sesión</h2>
      </div>
      <span class="form__span">Ingrese su usuario, correo y contraseña para acceder</span>
      <input class="form__input" formControlName="username" type="text" placeholder="Usuario o correo electrónico" required />
      <input class="form__input" formControlName="password" type="password" placeholder="Contraseña" required />

      <input type="hidden" name="next" [value]="nextParam" />
      <button class="form__button button submit" type="submit">ENTRAR</button>
    </form>
  </div>
  <div class="switch" id="switch-cnt">
    <div class="switch__circle"></div>
    <div class="switch__circle switch__circle--t"></div>
    <div class="switch__container" id="switch-c1">
      <h2 class="switch__title title">¡Bienvenido!</h2>
      <p class="switch__description description">Accede a la plataforma de Flag Soluciones con tus credenciales.</p>
    </div>
  </div>
</div>
